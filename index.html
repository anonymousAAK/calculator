<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>

<div id="app">

    <!-- Mode Tabs -->
    <div id="mode-tabs">
        <button class="mode-tab active" data-mode="scientific">Scientific</button>
        <button class="mode-tab" data-mode="financial">Financial</button>
        <button class="mode-tab" data-mode="graphing">Graphing</button>
    </div>

    <!-- ===================== SCIENTIFIC ===================== -->
    <div id="scientific-calc" class="calc-screen active">

        <div class="display-wrap">
            <div class="display-indicators">
                <span id="sci-angle-ind" class="ind">DEG</span>
                <span id="sci-shift-ind" class="ind"></span>
                <span id="sci-hyp-ind"   class="ind"></span>
                <span id="sci-mem-ind"   class="ind"></span>
            </div>
            <div class="display-history" id="sci-history"></div>
            <div class="display-current" id="sci-display">0</div>
        </div>

        <div class="sci-grid">

            <!-- Row 1: shift functions -->
            <button class="btn btn-fn shift-key" id="sci-shift-btn">2nd</button>
            <button class="btn btn-fn" data-k="x2"   data-s="sqrt" ><span class="p">x²</span><span class="s">√</span></button>
            <button class="btn btn-fn" data-k="x3"   data-s="cbrt" ><span class="p">x³</span><span class="s">∛</span></button>
            <button class="btn btn-fn" data-k="yx"   data-s="xrty" ><span class="p">yˣ</span><span class="s">ˣ√y</span></button>
            <button class="btn btn-fn" data-k="ex"   data-s="ln"   ><span class="p">eˣ</span><span class="s">ln</span></button>
            <button class="btn btn-fn" data-k="10x"  data-s="log"  ><span class="p">10ˣ</span><span class="s">log</span></button>

            <!-- Row 2: trig -->
            <button class="btn btn-fn" data-k="sin"  data-s="asin" ><span class="p">sin</span><span class="s">sin⁻¹</span></button>
            <button class="btn btn-fn" data-k="cos"  data-s="acos" ><span class="p">cos</span><span class="s">cos⁻¹</span></button>
            <button class="btn btn-fn" data-k="tan"  data-s="atan" ><span class="p">tan</span><span class="s">tan⁻¹</span></button>
            <button class="btn btn-fn" data-k="pi"                 ><span class="p">π</span></button>
            <button class="btn btn-fn" data-k="econ" data-s="EE"   ><span class="p">e</span><span class="s">EE</span></button>
            <button class="btn btn-fn" data-k="hyp"                ><span class="p">HYP</span></button>

            <!-- Row 3: misc -->
            <button class="btn btn-fn" data-k="fact" ><span class="p">x!</span></button>
            <button class="btn btn-fn" data-k="npr"  data-s="ncr"  ><span class="p">nPr</span><span class="s">nCr</span></button>
            <button class="btn btn-fn" data-k="recip"><span class="p">1/x</span></button>
            <button class="btn btn-fn" data-k="abs"  ><span class="p">|x|</span></button>
            <button class="btn btn-fn" data-k="ran"  ><span class="p">Ran#</span></button>
            <button class="btn btn-fn" data-k="degrad"><span class="p" id="degrad-lbl">DEG</span></button>

            <!-- Row 4: memory -->
            <button class="btn btn-mem" data-k="mc" >MC</button>
            <button class="btn btn-mem" data-k="mr" >MR</button>
            <button class="btn btn-mem" data-k="ms" >M+</button>
            <button class="btn btn-mem" data-k="mminus">M−</button>
            <button class="btn btn-mem" data-k="ans">ANS</button>
            <button class="btn btn-mem" data-k="paren">( )</button>

            <!-- Row 5: clear + operator -->
            <button class="btn btn-lt" data-k="ac" id="sci-ac-btn">AC</button>
            <button class="btn btn-lt" data-k="neg">+/−</button>
            <button class="btn btn-lt" data-k="pct">%</button>
            <button class="btn btn-op" data-k="del">⌫</button>
            <button class="btn btn-op" data-k="("  >(</button>
            <button class="btn btn-op" data-k=")"  >)</button>

            <!-- Rows 6-9: numpad + operators -->
            <button class="btn btn-num" data-k="7">7</button>
            <button class="btn btn-num" data-k="8">8</button>
            <button class="btn btn-num" data-k="9">9</button>
            <button class="btn btn-op btn-op-active" data-k="div">÷</button>
            <button class="btn btn-op" data-k="mod"><span class="p">mod</span></button>
            <button class="btn btn-op pow-btn" data-k="pow">xʸ</button>

            <button class="btn btn-num" data-k="4">4</button>
            <button class="btn btn-num" data-k="5">5</button>
            <button class="btn btn-num" data-k="6">6</button>
            <button class="btn btn-op btn-op-active" data-k="mul">×</button>
            <button class="btn btn-op" data-k="sqrt2">√x</button>
            <button class="btn btn-op" data-k="frac">a/b</button>

            <button class="btn btn-num" data-k="1">1</button>
            <button class="btn btn-num" data-k="2">2</button>
            <button class="btn btn-num" data-k="3">3</button>
            <button class="btn btn-op btn-op-active" data-k="sub">−</button>
            <button class="btn btn-fn" data-k="log2"><span class="p">log₂</span></button>
            <button class="btn btn-fn" data-k="floor"><span class="p">⌊x⌋</span></button>

            <button class="btn btn-num btn-zero" data-k="0">0</button>
            <button class="btn btn-num" data-k=".">.</button>
            <button class="btn btn-op btn-op-active" data-k="add">+</button>
            <button class="btn btn-eq" data-k="eq">=</button>
        </div>
    </div>

    <!-- ===================== FINANCIAL ===================== -->
    <div id="financial-calc" class="calc-screen">

        <div class="display-wrap fin-display-wrap">
            <div class="fin-status-bar">
                <span id="fin-mode-ind" class="fin-badge">END</span>
                <span id="fin-ws-ind" class="fin-ws">TVM</span>
                <span id="fin-2nd-ind" class="fin-badge" style="display:none">2nd</span>
            </div>
            <div class="display-history" id="fin-history"></div>
            <div class="display-current" id="fin-display">0</div>
        </div>

        <div class="fin-grid">
            <!-- Row 1: 2nd key + TVM -->
            <button class="btn btn-fn fin-2nd-key" id="fin-2nd-btn">2nd</button>
            <button class="btn btn-tvm" data-fk="N"   data-fs="xPY" ><span class="p">N</span><span class="s">xP/Y</span></button>
            <button class="btn btn-tvm" data-fk="IY"  data-fs="PY"  ><span class="p">I/Y</span><span class="s">P/Y</span></button>
            <button class="btn btn-tvm" data-fk="PV"  data-fs="AMORT"><span class="p">PV</span><span class="s">AMORT</span></button>
            <button class="btn btn-tvm" data-fk="PMT" data-fs="BGN" ><span class="p">PMT</span><span class="s">BGN</span></button>
            <button class="btn btn-tvm" data-fk="FV"  data-fs="CLRTVM"><span class="p">FV</span><span class="s">CLR TVM</span></button>

            <!-- Row 2: Worksheets -->
            <button class="btn btn-fn" data-fk="CF"  >CF</button>
            <button class="btn btn-fn" data-fk="NPV" >NPV</button>
            <button class="btn btn-fn" data-fk="IRR" >IRR</button>
            <button class="btn btn-fn" data-fk="STAT">STAT</button>
            <button class="btn btn-fn" data-fk="BOND">BOND</button>
            <button class="btn btn-fn" data-fk="DEPR">DEPR</button>

            <!-- Row 3: compute / nav -->
            <button class="btn btn-cpt" data-fk="CPT" >CPT</button>
            <button class="btn btn-fn"  data-fk="UP"  >▲</button>
            <button class="btn btn-fn"  data-fk="DOWN">▼</button>
            <button class="btn btn-fn"  data-fk="ENTER">ENTER</button>
            <button class="btn btn-lt"  data-fk="CE"  >CE/C</button>
            <button class="btn btn-lt"  data-fk="QUIT">QUIT</button>

            <!-- Row 4-7: numpad -->
            <button class="btn btn-num" data-fk="7">7</button>
            <button class="btn btn-num" data-fk="8">8</button>
            <button class="btn btn-num" data-fk="9">9</button>
            <button class="btn btn-op btn-op-active" data-fk="fdiv">÷</button>
            <button class="btn btn-fn" data-fk="sqrt" ><span class="p">√x</span><span class="s">x²</span></button>
            <button class="btn btn-fn" data-fk="ln"   ><span class="p">ln</span><span class="s">eˣ</span></button>

            <button class="btn btn-num" data-fk="4">4</button>
            <button class="btn btn-num" data-fk="5">5</button>
            <button class="btn btn-num" data-fk="6">6</button>
            <button class="btn btn-op btn-op-active" data-fk="fmul">×</button>
            <button class="btn btn-fn" data-fk="recip">1/x</button>
            <button class="btn btn-fn" data-fk="yx"   ><span class="p">yˣ</span></button>

            <button class="btn btn-num" data-fk="1">1</button>
            <button class="btn btn-num" data-fk="2">2</button>
            <button class="btn btn-num" data-fk="3">3</button>
            <button class="btn btn-op btn-op-active" data-fk="fsub">−</button>
            <button class="btn btn-mem" data-fk="STO">STO</button>
            <button class="btn btn-mem" data-fk="RCL">RCL</button>

            <button class="btn btn-num btn-zero" data-fk="0">0</button>
            <button class="btn btn-num" data-fk=".">.</button>
            <button class="btn btn-lt"  data-fk="neg">+/−</button>
            <button class="btn btn-op btn-op-active" data-fk="fadd">+</button>
            <button class="btn btn-eq" data-fk="feq">=</button>
        </div>

        <!-- CF / Stat worksheet -->
        <div id="fin-worksheet"></div>
    </div>

    <!-- ===================== GRAPHING ===================== -->
    <div id="graphing-calc" class="calc-screen">
        <div class="graph-layout">

            <div class="graph-sidebar">
                <div class="graph-section-title">Functions</div>
                <div id="graph-func-list">
                    <div class="graph-func-row" data-idx="0">
                        <input type="checkbox" checked class="graph-toggle" data-idx="0"/>
                        <span class="graph-color-dot" style="background:#ff9f0a"></span>
                        <span class="graph-label">Y₁=</span>
                        <input type="text" class="graph-input" data-idx="0" placeholder="e.g. sin(x)"/>
                    </div>
                </div>
                <div class="graph-row-btns">
                    <button class="gbtn" id="gadd">+ Add</button>
                    <button class="gbtn" id="gclear-fn">Clear all</button>
                </div>

                <div class="graph-section-title" style="margin-top:12px">Window</div>
                <div class="graph-window-grid">
                    <label>Xmin</label><input type="number" id="gxmin" value="-10"/>
                    <label>Xmax</label><input type="number" id="gxmax" value="10"/>
                    <label>Ymin</label><input type="number" id="gymin" value="-10"/>
                    <label>Ymax</label><input type="number" id="gymax" value="10"/>
                </div>

                <div class="graph-row-btns" style="margin-top:8px">
                    <button class="gbtn gbtn-primary" id="gplot">Graph</button>
                    <button class="gbtn" id="gzoomin">Zoom +</button>
                    <button class="gbtn" id="gzoomout">Zoom −</button>
                    <button class="gbtn" id="gfit">Fit</button>
                </div>
                <div class="graph-row-btns">
                    <button class="gbtn" id="gtrace">Trace</button>
                    <button class="gbtn" id="gtable-btn">Table</button>
                </div>

                <div class="graph-section-title" style="margin-top:12px">Analysis</div>
                <div class="graph-row-btns">
                    <button class="gbtn" id="gzero">Zero</button>
                    <button class="gbtn" id="gmin">Min</button>
                    <button class="gbtn" id="gmax">Max</button>
                </div>
                <div class="graph-row-btns">
                    <button class="gbtn" id="ginter">Intersect</button>
                    <button class="gbtn" id="gderiv">dy/dx</button>
                    <button class="gbtn" id="ginteg">∫f(x)dx</button>
                </div>

                <div class="graph-info-box" id="graph-info"></div>

                <div id="graph-table-panel" style="display:none">
                    <div class="graph-section-title" style="margin-top:10px">Table</div>
                    <div class="graph-row-btns">
                        <label style="color:#888;font-size:.75rem">Start</label>
                        <input type="number" id="gtstart" value="-5" style="width:54px"/>
                        <label style="color:#888;font-size:.75rem">Step</label>
                        <input type="number" id="gtstep" value="1" style="width:44px"/>
                        <button class="gbtn" id="gtgen">Go</button>
                    </div>
                    <div class="graph-table-scroll">
                        <table id="gtable"><thead><tr><th>X</th></tr></thead><tbody></tbody></table>
                    </div>
                </div>
            </div>

            <div class="graph-canvas-wrap">
                <canvas id="graph-canvas"></canvas>
                <div class="graph-xy" id="graph-xy"></div>
            </div>
        </div>
    </div>

</div><!-- #app -->

<script src="./index.js"></script>
</body>
</html>
